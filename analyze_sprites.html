<!DOCTYPE html>
<html>
<head>
    <title>Sprite Sheet Analyzer</title>
    <style>
        body { font-family: monospace; background: #222; color: #eee; }
        canvas { border: 1px solid #555; display: block; margin: 10px 0; }
        #output { background: #000; padding: 10px; white-space: pre; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>Sprite Sheet Analyzer</h1>
    <canvas id="canvas"></canvas>
    <div id="output">Analyzing...</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        const img = new Image();
        img.src = 'assets/SpriteSheet.png';

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const visited = new Uint8Array(width * height);
            const sprites = [];

            function isVisible(x, y) {
                const idx = (y * width + x) * 4;
                const r = data[idx];
                const g = data[idx + 1];
                const b = data[idx + 2];
                const a = data[idx + 3];
                // Background is white or transparent
                if (a < 10) return false;
                if (r > 245 && g > 245 && b > 245) return false;
                return true;
            }

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (!visited[idx] && isVisible(x, y)) {
                        // Flood fill / BFS to find bounding box
                        let minX = x, maxX = x, minY = y, maxY = y;
                        const queue = [[x, y]];
                        visited[idx] = 1;

                        while (queue.length > 0) {
                            const [cx, cy] = queue.shift();
                            if (cx < minX) minX = cx;
                            if (cx > maxX) maxX = cx;
                            if (cy < minY) minY = cy;
                            if (cy > maxY) maxY = cy;

                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    const nx = cx + dx;
                                    const ny = cy + dy;
                                    if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                        const nidx = ny * width + nx;
                                        if (!visited[nidx] && isVisible(nx, ny)) {
                                            visited[nidx] = 1;
                                            queue.push([nx, ny]);
                                        }
                                    }
                                }
                            }
                        }

                        if (maxX - minX > 5 && maxY - minY > 5) { // Filter noise
                            sprites.push({ x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 });
                        }
                    }
                }
            }

            // Sort sprites by row, then col
            sprites.sort((a, b) => {
                if (Math.abs(a.y - b.y) < 20) return a.x - b.x;
                return a.y - b.y;
            });

            output.innerHTML = JSON.stringify(sprites, null, 2);
            console.log("SPRITE_DATA_START");
            console.log(JSON.stringify(sprites));
            console.log("SPRITE_DATA_END");
        };
    </script>
</body>
</html>
