<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮皮狗贪吃蛇</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Canvas 画布 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- 资源加载画面 -->
        <div id="loading-screen" class="screen active" style="background: #1a1a2e;">
            <h1 style="font-size: 36px; margin-bottom: 30px;">🐕 皮皮狗贪吃蛇</h1>
            <p style="margin-bottom: 20px; color: #aaa;">正在加载资源...</p>
            <div id="loading-bar-bg" style="width: 260px; height: 16px; background: rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden;">
                <div id="loading-bar-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #ff9f43); border-radius: 8px; transition: width 0.2s;"></div>
            </div>
            <p id="loading-percent" style="margin-top: 12px; font-size: 14px; color: #888;">0%</p>
        </div>
        
        <!-- UI 蒙层 -->
        <div id="start-screen" class="screen">
            <h1>皮皮狗贪吃蛇</h1>
            <p>使用鼠标、WASD 或 <b>手机重力倾斜</b> 控制方向</p>
            <div class="rules">
                <p><b>玩法规则：</b></p>
                <p>🦴 骨头 (小+1/中+2/大+5节) &nbsp; 🍬 糖果 (+5节+🛡️) &nbsp; 🍞 面包 (+8节+🚀)</p>
                <p>🟢 绿虫 (长度减半) &nbsp; 💩 大便 (掉5节且静止陷阱)</p>
                <p>🔴 红虫、🪨 石头、🚧 边界栏杆 (碰到即死!)</p>
                <p>🪵 树木、🍄 房屋、🌺 花坛 (阻挡路线，需绕行)</p>
            </div>
            <button id="start-btn">开始游戏</button>
        </div>
        
        <div id="game-over-screen" class="screen">
            <h1>Game Over</h1>
            <p id="death-reason" style="color: #ff6b6b; font-weight: bold; margin-bottom: 20px;">死因: 未知</p>
            <p id="final-score">得分: 0</p>
            <p id="final-length">最大长度: 1</p>
            <button id="restart-btn">重新开始</button>
        </div>
        
        <!-- 移动端虚拟摇杆 -->
        <div id="joystick">
            <div id="joystick-knob"></div>
        </div>
        <button id="gravity-toggle">🔄 切换重力模式</button>
        <button id="boost-btn">🚀 冲刺 (3)</button>
        <button id="shield-btn">🛡️ 护盾 (2)</button>
    </div>

    <!-- 顺序引入脚本 -->
    <script src="js/assets.js"></script>
    <script src="js/input.js"></script>
    <script src="js/map.js"></script>
    <script src="js/player.js"></script>
    <script src="js/props.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
